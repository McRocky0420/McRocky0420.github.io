<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>动物园规则怪谈 · 深渊回廊</title>
  <style>
    :root {
      --bg: #0a0908; --panel: #151210; --text: #c8bfb2; --text-bright: #e6ddd2;
      --accent: #9b3a3a; --accent-glow: #c04a4a; --gold: #b89a5a; --blue-glow: #2a4a6a;
      --border: #2a221c; --btn-bg: #1b1612; --btn-hover: #241d17; --btn-border: #3a2e24;
      --danger: #6a2020; --safe: #2a4a2a; --warning: #5a4520; --clue-bg: #100e0b;
      --mythic: #c08a5c; --void: #1a1030;
      --s-rank: #ffd966; --a-rank: #ff6b6b; --b-rank: #ffaa33; --c-rank: #9a8a7a; --d-rank: #5a5a5a; --e-rank: #3a2a3a;
      font-size: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      background-image: radial-gradient(circle at 20% 30%, rgba(40,20,30,0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(20,30,50,0.5) 0%, transparent 60%);
      font-family: 'Noto Serif SC', 'Georgia', 'SimSun', 'KaiTi', serif;
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; color: var(--text);
    }
    .particles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index:0; }
    .particle { position: absolute; background: rgba(180,130,80,0.3); border-radius: 50%; animation: float linear infinite; opacity: 0; }
    @keyframes float { 0%{transform: translateY(105vh) scale(0); opacity:0;} 15%{opacity:0.7;} 85%{opacity:0.2;} 100%{transform: translateY(-15vh) scale(1.8); opacity:0;} }
    .main-container {
      position: relative; z-index:2; width:100%; max-width: 750px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 0 80px rgba(60,20,20,0.3), 0 0 150px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.02);
      overflow: hidden; transition: all 0.3s;
    }
    .header { background: linear-gradient(180deg, #1a100c 0%, #0f0a06 100%); border-bottom: 1px solid var(--border); padding: 18px 24px; text-align: center; }
    .header h1 { font-size: 1.7em; letter-spacing: 0.2em; color: var(--text-bright); font-weight: 400; text-shadow: 0 0 30px rgba(180,100,40,0.5); }
    .header .subtitle { font-size: 0.8em; color: #7a6a5a; letter-spacing: 0.25em; margin-top: 5px; }
    .time-display { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; background: #0a0705; border-bottom: 1px solid #201a14; font-size: 0.8em; color: #8a7a60; }
    .time-bar { width: 120px; height: 6px; background: #1a1510; border-radius: 3px; overflow: hidden; }
    .time-fill { height: 100%; width: 100%; background: #b89040; transition: width 0.5s; }
    .time-fill.urgent { background: #c04030; animation: pulse-bar 1s infinite; }
    @keyframes pulse-bar { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .clue-tracker { background: var(--clue-bg); border-bottom: 1px solid #2a1f16; padding: 10px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .clue-dot { width: 12px; height: 12px; border-radius: 50%; background: #1f1812; border: 1px solid #33261c; transition: all 0.4s; flex-shrink: 0; }
    .clue-dot.active { background: #b44a30; border-color: #c85a3a; box-shadow: 0 0 10px rgba(180,60,30,0.6); }
    .clue-dot.special { background: #c8a040; border-color: #e0b850; box-shadow: 0 0 16px rgba(200,150,40,0.8); }
    .clue-dot.mythic { background: #c080c0; border-color: #d0a0e0; box-shadow: 0 0 18px rgba(160,80,200,0.9); animation: myth-pulse 1.8s infinite; }
    @keyframes myth-pulse { 0%,100%{box-shadow: 0 0 12px rgba(160,80,200,0.6);} 50%{box-shadow: 0 0 24px rgba(180,100,220,1);} }
    .clue-label { font-size: 0.7em; color: #5a4838; letter-spacing: 0.1em; white-space: nowrap; }
    .content-area { padding: 24px 24px 18px; min-height: 300px; position: relative; }
    .scene-text { font-size: 1em; line-height: 1.85; letter-spacing: 0.04em; color: #bcb0a0; margin-bottom: 22px; white-space: pre-wrap; }
    .scene-text .highlight { color: #d4a870; font-style: italic; }
    .scene-text .warning-text { color: #c05040; font-weight: 600; }
    .scene-text .mythic-text { color: #b890c0; font-weight: 600; text-shadow: 0 0 8px rgba(150,80,180,0.5); }
    .scene-text .italic { font-style: italic; color: #9a8a7a; }
    .typing-cursor { display: inline-block; animation: blink 1s step-end infinite; color: #b44a3a; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    .choices-area { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .choice-btn { width: 100%; padding: 14px 18px; background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 6px; color: #b8a590; font-family: inherit; font-size: 0.9em; letter-spacing: 0.05em; cursor: pointer; text-align: left; transition: all 0.25s; }
    .choice-btn:hover { background: var(--btn-hover); border-color: #6a5040; color: #d8c8b8; box-shadow: 0 0 18px rgba(80,40,20,0.3); transform: translateX(4px); }
    .choice-btn.danger-choice { border-color: #4a2020; background: #180e0e; }
    .choice-btn.danger-choice:hover { border-color: #7a3030; box-shadow: 0 0 20px rgba(120,20,20,0.5); }
    .choice-btn.safe-choice { border-color: #2a3a2a; background: #0e180e; }
    .choice-btn.mythic-choice { border-color: #3a2a4a; background: #150e1a; }
    .ending-display { text-align: center; padding: 20px 0; }
    .ending-rank { font-size: 4.5em; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 8px; text-shadow: 0 0 40px currentColor; }
    .ending-rank.s-rank { color: #ffd966; } .ending-rank.a-rank { color: #ff6b6b; } .ending-rank.b-rank { color: #ffaa33; } .ending-rank.c-rank { color: #9a8a7a; } .ending-rank.d-rank { color: #6a6a6a; } .ending-rank.e-rank { color: #4a3a5a; }
    .ending-title { font-size: 1.6em; letter-spacing: 0.1em; margin-bottom: 14px; color: #d4c4b0; }
    .ending-desc { font-size: 0.9em; color: #9a8a7a; line-height: 1.8; margin-bottom: 18px; }
    .restart-btn { display: inline-block; padding: 12px 30px; background: transparent; border: 1px solid #4a3530; color: #a09080; font-family: inherit; font-size: 0.9em; letter-spacing: 0.1em; cursor: pointer; transition: all 0.3s; margin-top: 8px; }
    .restart-btn:hover { border-color: #8a6a5a; color: #d4c4b0; box-shadow: 0 0 20px rgba(100,50,30,0.4); background: #1a1410; }
    .footer-bar { border-top: 1px solid #201a14; padding: 10px 20px; font-size: 0.7em; color: #4a3a2a; display: flex; justify-content: space-between; background: #0a0806; }
    @media (max-width: 500px) { .header h1 { font-size: 1.3em; } .content-area { padding: 14px; } .choice-btn { font-size: 0.8em; } }
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="main-container" id="mainContainer">
  <div class="header"><h1>动 物 园 规 则 怪 谈</h1><div class="subtitle">—— 深 渊 回 廊 ——</div></div>
  <div class="time-display"><span id="timeLabel">⏳ 入园时间</span><div class="time-bar"><div class="time-fill" id="timeFill"></div></div><span id="timeValue">15:00</span></div>
  <div class="clue-tracker" id="clueTracker">
    <span class="clue-label">📜 认知：</span>
    <span class="clue-dot" id="dot1"></span><span class="clue-dot" id="dot2"></span><span class="clue-dot" id="dot3"></span><span class="clue-dot" id="dot4"></span>
    <span class="clue-dot" id="dot5"></span><span class="clue-dot" id="dot6"></span><span class="clue-dot" id="dot7"></span><span class="clue-dot" id="dot8"></span>
  </div>
  <div class="content-area" id="contentArea"><div class="scene-text" id="sceneText"></div><div class="choices-area" id="choicesArea"></div></div>
  <div class="footer-bar"><span id="footerLeft">📍 入口</span><span id="footerRight">🌫 未知</span></div>
</div>
<script>
(function() {
  // 粒子背景
  for(let i=0;i<40;i++){let p=document.createElement('div');p.className='particle';let s=Math.random()*3+1.5;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';p.style.animationDuration=(Math.random()*18+10)+'s';p.style.animationDelay=(Math.random()*10)+'s';document.getElementById('particles').appendChild(p);}

  const state = {
    clues: { c1:false,c2:false,c3:false,c4:false,c5:false,c6:false,c7:false,c8:false },
    flags: { readRules:false, followedRabbit:false, enteredOcean:false, ignoredWorker:false, staredRabbit:false, ran:false, sawIt:false, heardWhisper:false, tookMap:false, touchedMirror:false, freedLion:false, metGuardian:false, acceptedVoid:false, brokeCycle:false, fledFromFourth:false, nightfallTriggered:false, stayedWithLions:false },
    time: 900, choices: [], visits: 0
  };

  const dom = {
    sceneText: document.getElementById('sceneText'), choices: document.getElementById('choicesArea'),
    timeFill: document.getElementById('timeFill'), timeValue: document.getElementById('timeValue'),
    footerLeft: document.getElementById('footerLeft'), footerRight: document.getElementById('footerRight'),
    content: document.getElementById('contentArea')
  };

  function updateTime(minutes) {
    state.time = Math.max(0, minutes);
    let h = Math.floor(state.time/60), m = state.time%60;
    dom.timeValue.textContent = `${h}:${m.toString().padStart(2,'0')}`;
    let percent = Math.max(0, (state.time/1080)*100);
    dom.timeFill.style.width = percent+'%';
    if(state.time < 120) dom.timeFill.classList.add('urgent');
    else dom.timeFill.classList.remove('urgent');
    if(state.time <= 0) forceNightfall();
  }

  function forceNightfall() {
    if(!state.flags.nightfallTriggered) {
      state.flags.nightfallTriggered = true;
      if(!currentSceneId.startsWith('night_') && !currentSceneId.startsWith('ending_')) loadScene('nightfall_force');
    }
  }

  function updateClues() {
    ['c1','c2','c3','c4','c5','c6','c7','c8'].forEach((id,i)=>{
      let dot = document.getElementById('dot'+(i+1));
      if(state.clues[id]) { dot.classList.add('active'); if(id==='c5'||id==='c6') dot.classList.add('special'); if(id==='c7'||id==='c8') dot.classList.add('mythic'); }
      else dot.classList.remove('active','special','mythic');
    });
  }

  const scenes = {};
  function S(id, text, choices, footer, timeCost=0) { scenes[id] = { id, text, choices: choices||[], footer: footer||{left:'📍 园区',right:'🌫 未知'}, timeCost }; }

  // ========== 场景定义 ==========
  S('start', `你站在动物园锈迹斑斑的大门前。天色阴沉，空气中弥漫着潮湿的泥土味与一丝若有若无的<span class="highlight">甜腻气息</span>。
宣传栏上贴着一张泛黄的<span class="highlight">《入园须知》</span>，旁边还有一块崭新的铜牌，上面刻着"本园为市级文明单位"。
一个身穿黑色制服的工作人员站在门内，面无表情地看着你。`, [
    { text: '📜 仔细阅读《入园须知》', target: 'read_rules', effect: 'c1', time: 5 },
    { text: '🚶 忽略一切，直接入园', target: 'enter_direct', time: 3 },
    { text: '🗣 与黑衣员工搭话', target: 'talk_worker_start', time: 4 },
    { text: '🔍 检查铜牌与周围环境', target: 'inspect_plaque', time: 6 }
  ], {left:'📍 入口',right:'⏳ 15:00'}, 0);

  S('read_rules', `<span class="highlight">《入园须知》</span>：
1. 请勿在园区内奔跑。
2. 若看到<span class="warning-text">白兔</span>，勿对视超过三秒。
3. 地图<span class="warning-text">虚线区域</span>不属于本园，禁止前往。
4. 海洋馆<span class="warning-text">永久关闭</span>，无视任何指示牌。
5. <span class="warning-text">黑衣员工</span>不会主动交谈。若他们开口……请假装没听见。
6. 请在<span class="warning-text">日落前</span>离开。
角落有一行小字：<span class="italic">"规则是墙。墙外是虚无。"</span>`, [
    { text: '📌 记住规则，谨慎入园', target: 'enter_careful', effect: 'c1', time: 4 },
    { text: '🤨 觉得荒诞，随手拍照后入园', target: 'enter_direct', time: 3 },
    { text: '📸 拍下规则照片，仔细研究', target: 'photo_rules', time: 8 }
  ], {left:'📍 宣传栏',right:'⏳ 15:05'}, 5);

  S('photo_rules', `你拍下规则照片放大查看。在"海洋馆永久关闭"下方，隐约有一行被涂改液覆盖的字迹。
透过像素仔细辨认，你读到：<span class="mythic-text">"但镜子记得。狮子是锁，兔子是眼。深渊有七层，此为第三。"</span>
你后背一凉。这是什么意思？`, [
    { text: '🔮 带着疑问谨慎入园', target: 'enter_careful', effect: 'c7', time: 4 },
    { text: '📞 试图拨打照片上的某个模糊号码', target: 'call_number', time: 6 }
  ], {left:'📍 宣传栏',right:'⏳ 15:08'}, 6);

  S('call_number', `你尝试拨打照片上模糊的数字。电话接通了。
对面传来一阵<span class="highlight">沉重的呼吸声</span>，然后一个沙哑的声音说："你不该打这个电话。但既然打了……记住，<span class="warning-text">黑衣员工曾经都是游客</span>。找到那个眼睛还在的。"电话挂断。`, [
    { text: '😨 带着恐惧入园', target: 'enter_careful', effect: 'c4', time: 4 }
  ], {left:'📍 入口',right:'⏳ 15:14'}, 6);

  S('inspect_plaque', `铜牌上除了"文明单位"，边缘刻着极小的符号——一个圆被虚线穿过，下方写着"Ⅲ"。
旁边地面有拖拽痕迹，指向灌木丛深处。你拨开灌木，发现一本<span class="highlight">被撕掉一半的日记</span>。
可读部分写着："...第7天，狮子开口说话了。它说'还差一个'。我不知道是什么意思..."`, [
    { text: '📖 带上日记残页入园', target: 'enter_careful', effect: 'c8', time: 6 },
    { text: '🚷 感到不安，暂时离开', target: 'ending_early_leave_c', time: 1 }
  ], {left:'📍 入口灌木',right:'⏳ 15:06'}, 6);

  S('talk_worker_start', `你向黑衣员工打招呼。他的嘴唇紧闭，但喉咙里发出低沉的嗡鸣。
突然，他的左眼<span class="highlight">流下一行黑色的液体</span>。他用极小的幅度摇了摇头，然后指向园区深处——指向的是<span class="warning-text">狮子区的方向</span>。`, [
    { text: '🦁 听从暗示，前往狮子区', target: 'lion_zone_early', effect: 'c4', time: 8 },
    { text: '😰 被吓到，直接入园乱逛', target: 'enter_direct', time: 4 }
  ], {left:'📍 入口',right:'⏳ 15:04'}, 4);

  S('enter_direct', `你径直走进园区。小径两旁灌木过于整齐。前方分岔路：<span class="highlight">兔子园</span>（左）、<span class="highlight">狮子区</span>（中）、<span class="highlight">游客中心</span>（右）。
地面有奇怪的爪印，不似任何已知动物。`, [
    { text: '🐇 兔子园', target: 'rabbit_zone', time: 6 },
    { text: '🦁 狮子区', target: 'lion_zone', time: 6 },
    { text: '🏛 游客中心', target: 'visitor_center', time: 5 }
  ], {left:'📍 分岔口',right:'⏳ 15:07'}, 3);

  S('enter_careful', `你将规则牢记于心，谨慎前行。来到分岔口，地上有一张被踩过的<span class="highlight">园区地图</span>。
地图右下角虚线区域被划掉，旁边小字"海洋馆"。背面铅笔字：<span class="warning-text">"别信虚线。若已见虚线，去找狮子。"</span>`, [
    { text: '🗺 捡起地图研究', target: 'study_map', effect: 'c2', time: 5 },
    { text: '🐇 前往兔子园', target: 'rabbit_zone', time: 6 },
    { text: '🦁 前往狮子区', target: 'lion_zone_with_clue', time: 6 }
  ], {left:'📍 分岔口',right:'⏳ 15:10'}, 4);

  S('study_map', `地图虚线被刻意涂抹。透过光看，虚线构成一个七边形，每个角标注罗马数字。
你所在位置是"Ⅲ"。背面还有字：<span class="mythic-text">"七层深渊，此为第三。守门人失明了，需要新的眼睛。"</span>`, [
    { text: '🦁 带地图去狮子区', target: 'lion_zone_with_clue', effect: 'c7', time: 6 },
    { text: '🔎 尝试寻找虚线入口', target: 'seek_dashed', time: 8 }
  ], {left:'📍 分岔口',right:'⏳ 15:15'}, 5);

  S('seek_dashed', `你按虚线标记找到一堵墙。墙上粉笔字：<span class="warning-text">"虚线之内是真相。但真相不适合所有人。"</span>
墙的轮廓隐约形成门的形状。`, [
    { text: '🚪 等待门出现', target: 'wait_door', time: 15 },
    { text: '🔙 返回主路', target: 'enter_careful', time: 5 }
  ], {left:'📍 虚线边界',right:'⏳ 15:20'}, 8);

  S('wait_door', `日落时分，墙上门显现。门内是海洋馆幽蓝的光。水箱深处，一个<span class="warning-text">巨大的阴影</span>正缓缓转身。
门框上刻着："<span class="mythic-text">第三层·感知之渊</span>"。`, [
    { text: '🌊 踏入海洋馆', target: 'enter_ocean_hall', effect: 'enteredOcean', time: 8 },
    { text: '🏃 关门逃跑', target: 'flee_ocean', time: 4 }
  ], {left:'📍 虚线之门',right:'⏳ 日落'}, 15);

  S('rabbit_zone', `兔子园内十几只灰兔安静蹲着。角落一只<span class="warning-text">纯白兔子</span>，红眼如流动液体。
它缓缓转头，看向后方隐蔽小径。标牌："员工通道·游客止步"，下方涂改箭头指向"海洋馆"。`, [
    { text: '🐇 跟随白兔指引走小径', target: 'follow_rabbit', effect: 'followedRabbit', time: 7 },
    { text: '👀 盯着白兔眼睛', target: 'stare_rabbit', time: 2 },
    { text: '🚶 移开视线离开', target: 'leave_rabbit', effect: 'c3', time: 4 },
    { text: '📸 给白兔拍照', target: 'photo_rabbit', time: 3 }
  ], {left:'📍 兔子园',right:'⏳ 15:25'}, 6);

  S('photo_rabbit', `你拍下白兔。照片里，白兔的位置<span class="highlight">没有任何兔子</span>——只有一个模糊的、人形的白色轮廓。
你抬头，白兔还在原地。但照片里……那个人形轮廓正在<span class="warning-text">转向镜头</span>。`, [
    { text: '😱 删除照片逃离', target: 'flee_rabbit_zone', effect: 'sawIt', time: 3 },
    { text: '🔍 继续观察白兔', target: 'stare_rabbit', time: 2 }
  ], {left:'📍 兔子园',right:'⏳ 15:28'}, 3);

  S('stare_rabbit', `对视三秒。白兔嘴巴张开，露出<span class="highlight">人类般的牙齿</span>。天空变暗红。
脑内声音：<span class="warning-text">"你看到了。现在它也能看到你了。"</span>眩晕袭来，白兔消失。太阳穴剧痛。`, [
    { text: '🏃 惊慌逃离', target: 'flee_rabbit_zone', effect: 'sawIt', time: 3 },
    { text: '🚶 强作镇定走向小径', target: 'follow_rabbit', effect: 'followedRabbit', time: 7 }
  ], {left:'📍 兔子园',right:'⏳ 15:30'}, 2);

  S('follow_rabbit', `小径尽头是一栋灰色建筑：<span class="warning-text">海洋馆</span>。门口黑衣员工脸上没有眼睛。
他身旁石碑刻着："<span class="mythic-text">第三看守所·失明者守门</span>"。`, [

  S('ending_d_abyss', `<div class="ending-display"><div class="ending-rank d-rank">D</div><div class="ending-title">「它看见你了」</div><div class="ending-desc">你靠近黑色球体。所有真相同时涌入——人类心智无法承受。<span class="warning-text">自我溶解</span>。你成为黑衣员工，没有眼睛，只有永恒的沉默守护。</div><div class="ending-clues-summary">🕳️ 最坏结局 · 意识被真相摧毁</div></div>`, [{text:'🔄 重新开始', target:'start', effect:'reset'}], {left:'📍 地下',right:'🖤 永恒'});

  S('ending_d_deeper', `<div class="ending-display"><div class="ending-rank e-rank">E</div><div class="ending-title">「深渊召唤」</div><div class="ending-desc">你在第四层选择继续深入。走向第五层——<span class="mythic-text">意志之炉</span>。然后就没有然后了。没有人知道第五层以下是什么。只知道进去的人从未回来。</div><div class="ending-clues-summary">⚠ 隐藏结局 · 深入未知，彻底消失</div></div>`, [{text:'🔄 重新开始', target:'start', effect:'reset'}], {left:'📍 第五层?',right:'💀 消失'});

  S('ending_e_void', `<div class="ending-display"><div class="ending-rank e-rank">E</div><div class="ending-title">「虚空守望者」</div><div class="ending-desc">你在幻象中接受了"王"的邀请。你成为了<span class="mythic-text">虚空的一部分</span>。你的意识扩散到整个深渊，能看到所有七层、所有入口、所有守门人。但你不再是"你"了。你是守望者之一。</div><div class="ending-clues-summary">🌌 隐藏结局 · 成为虚空的一部分</div></div>`, [{text:'🔄 重新开始', target:'start', effect:'reset'}], {left:'📍 第七层',right:'🌌 永恒守望'});

  // ========== 游戏引擎 ==========
  let currentSceneId = 'start';
  let typingTimer = null;
  let isTyping = false;
  let fullText = '';

  function typeText(text, cb) {
    if(typingTimer) clearTimeout(typingTimer);
    isTyping = true; fullText = text;
    dom.sceneText.innerHTML = ''; let i=0, displayed='';
    function type(){
      if(i<text.length){
        if(text[i]==='<'){ let end=text.indexOf('>',i); if(end!==-1){ displayed+=text.substring(i,end+1); i=end+1; dom.sceneText.innerHTML=displayed+'<span class="typing-cursor">|</span>'; typingTimer=setTimeout(type,5); return; } }
        displayed+=text[i]; i++; dom.sceneText.innerHTML=displayed+'<span class="typing-cursor">|</span>';
        let delay = (text[i-1]==='。'||text[i-1]==='…')?100:(text[i-1]==='；'||text[i-1]==='，')?50:15+Math.random()*12;
        typingTimer=setTimeout(type, delay);
      } else { dom.sceneText.innerHTML=displayed; isTyping=false; if(cb) cb(); }
    }
    type();
  }

  function skipTyping() { if(isTyping&&typingTimer){ clearTimeout(typingTimer); isTyping=false; dom.sceneText.innerHTML=fullText; } }

  // 结局分派逻辑
  function resolveStoneEnding() {
    // 优先级1：从第四层逃回来的 → 归来者
    if (state.flags.fledFromFourth) return 'ending_b_return';
    // 优先级2：狮子场景选择"带着全部记忆离开" → 清醒者
    if (state.clues.c5 && state.clues.c6 && state.clues.c7 && state.clues.c8) return 'ending_s_true';
    // 优先级3：与狮子待在一起或在危急时冲向石板 → 狮子的恩惠
    if (state.flags.stayedWithLions || state.flags.sawIt) return 'ending_a_lion';
    // 优先级4：默认 → 幸存者
    return 'ending_b_survivor';
  }

  function loadScene(id) {
    // 特殊处理：石板结局分派
    if (id === 'resolve_stone_ending') {
      id = resolveStoneEnding();
    }
    if(isTyping) skipTyping();
    let scene = scenes[id]; if(!scene) return;
    currentSceneId = id; state.visits++;
    if(scene.timeCost) updateTime(state.time - scene.timeCost);
    dom.footerLeft.textContent = scene.footer?.left||'📍 园区';
    dom.footerRight.textContent = scene.footer?.right||'🌫 未知';
    dom.choices.innerHTML = '';
    if(state.visits>20) { dom.sceneText.innerHTML=scene.text; fullText=scene.text; isTyping=false; }
    else typeText(scene.text, ()=>{});
    scene.choices.forEach((ch,i)=>{
      let btn = document.createElement('button');
      btn.className = 'choice-btn';
      if(ch.text.includes('逃')||ch.text.includes('跑')||ch.text.includes('离开')||ch.text.includes('拼命')) btn.classList.add('danger-choice');
      if(ch.text.includes('狮子')||ch.text.includes('石板')||ch.text.includes('遵守')||ch.text.includes('听从')) btn.classList.add('safe-choice');
      if(ch.text.includes('第四层')||ch.text.includes('深渊')||ch.text.includes('守门人')||ch.text.includes('虚空')) btn.classList.add('mythic-choice');
      btn.textContent = ch.text;
      btn.addEventListener('click', ()=>{
        if(isTyping) { skipTyping(); setTimeout(()=>executeChoice(ch),150); }
        else executeChoice(ch);
      });
      dom.choices.appendChild(btn);
    });
    if(id.startsWith('ending_')) { dom.content.classList.add('flash-warning'); setTimeout(()=>dom.content.classList.remove('flash-warning'),800); }
  }

  function executeChoice(ch) {
    if(ch.effect) {
      if(ch.effect==='reset') { resetGame(); return; }
      if(state.clues.hasOwnProperty(ch.effect)) state.clues[ch.effect]=true;
      else if(state.flags.hasOwnProperty(ch.effect)) state.flags[ch.effect]=true;
    }
    if(ch.time) updateTime(state.time - ch.time);
    state.choices.push({from:currentSceneId, text:ch.text});
    updateClues();
    loadScene(ch.target);
  }

  function resetGame() {
    Object.keys(state.clues).forEach(k=>state.clues[k]=false);
    Object.keys(state.flags).forEach(k=>state.flags[k]=false);
    state.flags.nightfallTriggered = false;
    state.flags.fledFromFourth = false;
    state.flags.stayedWithLions = false;
    state.choices=[]; state.visits=0; state.time=900;
    updateTime(900); updateClues();
    loadScene('start');
  }

  dom.sceneText.addEventListener('click', ()=>{ if(isTyping) skipTyping(); });
  document.addEventListener('keydown', (e)=>{
    if(isTyping && (e.key===' '||e.key==='Enter')) { e.preventDefault(); skipTyping(); return; }
    let btns = dom.choices.querySelectorAll('.choice-btn');
    let n = parseInt(e.key);
    if(n>=1 && n<=btns.length) { e.preventDefault(); btns[n-1].click(); }
  });

  updateTime(900); updateClues(); loadScene('start');
  console.log('🦁 动物园规则怪谈·深渊回廊 已修复 | 15+结局 | 归来者可正常触发');
})();
</script>
</body>
</html>
